    draw();requestAnimationFrame(loop);}
  $('ureset').onclick=function(){load(lv);};$('uprev').onclick=function(){load(lv-1);};$('unext2').onclick=function(){load(lv+1);};$('unext').onclick=function(){load(lv+1);};
  var startIdx=0;for(var i=0;i<LEVELS.length;i++){if(!done[i]){startIdx=i;break;}}
  load(startIdx);requestAnimationFrame(loop);
})();
</script>
